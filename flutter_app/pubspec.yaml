name: vinsla_ai_academy
description: Learn AI the Smart Way — Python, AI & ML learning platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.5

  # HTTP & API
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI Components
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  percent_indicator: ^4.2.3
  flutter_markdown: ^0.6.22
  markdown: ^7.2.2

  # Code Highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3

  # Icons & Assets
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  image_picker: ^1.1.1
  connectivity_plus: ^6.0.3
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  retrofit_generator: ^8.1.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
